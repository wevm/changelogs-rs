name: Test Check Action

on:
  push:
    branches: [master]
    paths: ['check/**']
  pull_request:
    branches: [master]
    paths: ['check/**']

jobs:
  test-multiple-changelogs:
    name: Test with multiple changelog files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create multiple changelog files
        run: |
          cat > .changelog/test-one.md << 'ENTRY'
          ---
          changelogs: patch
          ---

          First test changelog.
          ENTRY

          cat > .changelog/test-two.md << 'ENTRY'
          ---
          changelogs: patch
          ---

          Second test changelog.
          ENTRY

          git config user.name "test"
          git config user.email "test@test.com"
          git add .changelog/test-one.md .changelog/test-two.md
          git commit -m "test: add multiple changelogs"

      - name: Run check action
        id: check
        uses: ./check
        with:
          ref: HEAD~1

      - name: Verify output
        run: |
          if [ "${{ steps.check.outputs.found }}" != "true" ]; then
            echo "Expected found=true, got '${{ steps.check.outputs.found }}'"
            exit 1
          fi
          echo "✅ Check action handled multiple changelog files correctly"
